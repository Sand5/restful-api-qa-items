name: Smoke Tests CI with Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 3. Build Docker image
      - name: Build Docker image
        run: docker build -t rest-api-tests .

      # 4. Run smoke tests inside Docker
      - name: Run smoke tests in Docker
        run: |
          docker run --rm \
            -e CUCUMBER_TAGS="@smoke" \
            -e THREAD_COUNT=2 \
            -v $PWD/target:/app/target \
            rest-api-tests

      # 5. Upload Surefire & Cucumber reports
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: |
            target/surefire-reports
            target/cucumber-report.html
            target/cucumber-report.json